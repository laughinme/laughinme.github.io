<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор локации</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f8f8f8);
            color: var(--tg-theme-text-color, #333);
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 16px;
        }
        button {
            background-color: var(--tg-theme-button-color, #007bff);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            cursor: pointer;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Выберите вашу локацию</h2>
        <select id="country" onchange="updateCities()">
            <option value="">Выберите страну</option>
            <option value="ru">Россия</option>
            <option value="us">США</option>
            <option value="de">Германия</option>
        </select>
        <select id="city" disabled>
            <option value="">Сначала выберите страну</option>
        </select>
        <button id="submit" disabled onclick="sendLocation()">Отправить</button>
    </div>
    <script>
        const cities = {
            ru: ["Москва", "Санкт-Петербург", "Казань"],
            us: ["Нью-Йорк", "Лос-Анджелес", "Чикаго"],
            de: ["Берлин", "Мюнхен", "Гамбург"]
        };

        function updateCities() {
            const countrySelect = document.getElementById('country');
            const citySelect = document.getElementById('city');
            const submitButton = document.getElementById('submit');
            
            citySelect.innerHTML = '<option value="">Выберите город</option>';
            citySelect.disabled = !countrySelect.value;
            submitButton.disabled = true;
            
            if (countrySelect.value) {
                cities[countrySelect.value].forEach(city => {
                    let option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });
            }
        }

        document.getElementById('city').addEventListener('change', function() {
            document.getElementById('submit').disabled = !this.value;
        });

        function sendLocation() {
            const country = document.getElementById('country').value;
            const city = document.getElementById('city').value;
            const data = { country, city };
            
            Telegram.WebApp.sendData(JSON.stringify(data));
            Telegram.WebApp.close();
        }

        Telegram.WebApp.ready();
    </script>
</body>
</html>
