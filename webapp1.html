<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор локации</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f8f8f8);
            color: var(--tg-theme-text-color, #333);
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 16px;
        }
        button {
            background-color: var(--tg-theme-button-color, #007bff);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            cursor: pointer;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Выберите вашу локацию</h2>
        <select id="country" onchange="loadCities()">
            <option value="">Загрузка стран...</option>
        </select>
        <select id="city" disabled>
            <option value="">Сначала выберите страну</option>
        </select>
        <button id="submit" disabled onclick="sendLocation()">Отправить</button>
    </div>
    <script>
        async function loadCountries() {
            try {
                const response = await fetch('countries.json'); // Просто указываем имя файла
                const countries = await response.json();
                populateCountries(countries);
            } catch (error) {
                console.error('Ошибка загрузки стран:', error);
            }
        }

        function populateCountries(countries) {
            const countrySelect = document.getElementById('country');
            countrySelect.innerHTML = '<option value="">Выберите страну</option>';

            for (const [name, code] of Object.entries(countries)) {
                let option = document.createElement('option');
                option.value = code;
                option.textContent = name;
                countrySelect.appendChild(option);
            }
        }

        async function loadCities() {
            const countryCode = document.getElementById('country').value;
            const citySelect = document.getElementById('city');
            const submitButton = document.getElementById('submit');

            citySelect.innerHTML = '<option value="">Загрузка городов...</option>';
            citySelect.disabled = true;
            submitButton.disabled = true;

            if (!countryCode) return;

            try {
                const response = await fetch(`https://geocoding-api.open-meteo.com/v1/search?country=${countryCode}&count=10&language=ru`);
                const data = await response.json();

                citySelect.innerHTML = '<option value="">Выберите город</option>';
                if (data.results) {
                    data.results.forEach(city => {
                        let option = document.createElement('option');
                        option.value = city.name;
                        option.textContent = city.name;
                        citySelect.appendChild(option);
                    });
                    citySelect.disabled = false;
                } else {
                    citySelect.innerHTML = '<option value="">Нет данных</option>';
                }
            } catch (error) {
                console.error('Ошибка загрузки городов:', error);
                citySelect.innerHTML = '<option value="">Ошибка загрузки</option>';
            }
        }

        document.getElementById('city').addEventListener('change', function() {
            document.getElementById('submit').disabled = !this.value;
        });

        function sendLocation() {
            const country = document.getElementById('country').options[document.getElementById('country').selectedIndex].text;
            const city = document.getElementById('city').value;
            const data = { country, city };

            Telegram.WebApp.sendData(JSON.stringify(data));
            Telegram.WebApp.close();
        }

        document.addEventListener('DOMContentLoaded', loadCountries);
        Telegram.WebApp.ready();
    </script>
</body>
</html>
